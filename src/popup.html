<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>BetterCF Settings</title>

    <link rel="stylesheet" href="common.css">

    <style>
        body {
            margin: 0;
            width: 256px;
            padding: 0.75em;
        }
        .dark {
            background: #121212;
            color: #eee;
            border: 2px solid #eee;
            border-radius: 6px;
        }

        #ui {
            font-size: 1.15em;
        }
        #ui .toggle>span {
            position: absolute;
            width: 0.9rem;
            height: 0.9rem;
            top: calc(50% - 0.45rem);
            right: 0;
            display: inline-block;
            border: thin solid #188ecd;
            border-radius: 100%;
            background: #eee;
            transition: background 0.2s;
        }

        #logo {
            width: 5rem;
        }

        .centered {
            text-align: center;
        }

        .hr {
            display: block;
            border-top: 1px solid #7f7f7f52;
            width: 100vw;
            margin: .5em -0.75em;
        }
    </style>

</head>
<body>

    <div class="centered">
        <img id="logo" src="icons/bettercf-logo.svg" alt="BetterCF logo">
    </div>

    <script src="/browser-polyfill.min.js"></script>
    <script src="/popup.js"></script>

</body>
</html>
